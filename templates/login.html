{% extends 'base.html' %}
{% block title %}Login | LivestockAI{% endblock %}
{% block content %}
<div class="auth-shell fade-up">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <h2>Welcome back</h2>
            <p>Sign in to access the premium AI dashboard and prediction history.</p>
        </div>
        <form action="{{ url_for('login') }}" method="post" class="auth-form">
            <label>Username</label>
            <input name="username" type="text" placeholder="Enter your username" required />
            <label>Password</label>
            <input name="password" type="password" placeholder="Enter your password" required />
            <button type="submit" class="button primary">Sign In</button>
        </form>
        <p class="auth-note">New to LivestockAI? <a href="{{ url_for('register') }}">Create an account</a></p>
    </div>
</div>
{% endblock %}
